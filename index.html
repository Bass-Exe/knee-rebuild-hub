  label: "Phase 1",
  weeks: "Wks 1–2",
  theme: "Restore",

  mantra: "Zero pain. Full attention.",
  desc: "Re-establish the nerve-muscle connection foot to hip. No load — just range and control. Pain-free motion is the only goal.",

const DAYS = [{
  label: "Day 1",

      why: "Loads the tibialis anterior while simultaneously decompressing the knee joint. Ben Patrick calls this the single most important daily habit. The shin muscle firing here directly reduces patellar tendon stress.",

      noEquip: "Any flat surface — hallway, yard, driveway.",
